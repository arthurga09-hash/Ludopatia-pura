<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis Apuestas</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #121212;
            color: white;
            text-align: center;
            padding: 20px;
        }
        .container {
            max-width: 600px;
            margin: auto;
            background: #1e1e1e;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,255,0,0.2);
        }
        h1 { color: #00ff00; }
        .bet-card {
            border-bottom: 1px solid #333;
            padding: 10px 0;
        }
        .win { color: #00ff00; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Apuestas de Arthur</h1>
        <p>Bienvenido a mi panel de seguimiento de apuestas.</p>
        
        <div class="bet-card">
            <p><strong>Evento:</strong> Real Madrid vs Barcelona</p>
            <p><strong>Pronóstico:</strong> Gana Local</p>
            <p class="win">Estado: Pendiente</p>
        </div>

        <div class="bet-card">
            <p><strong>Evento:</strong> Manchester City vs Arsenal</p>
            <p><strong>Pronóstico:</strong> +2.5 Goles</p>
            <p class="win">Estado: Pendiente</p>
        </div>
    </div>
</body>
</html>
