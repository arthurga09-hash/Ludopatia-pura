<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Apuestas entre Colegas ⚽</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #0f172a 100%);
      font-family: Georgia, serif;
      color: #fff;
    }
    input, select, textarea, button { font-family: Georgia, serif; }
    .header {
      background: rgba(255,255,255,0.04);
      border-bottom: 1px solid rgba(255,255,255,0.08);
      padding: 13px 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
      backdrop-filter: blur(12px);
    }
    .container {
      max-width: 660px;
      margin: 0 auto;
      padding: 18px 14px 60px;
    }
    .login-wrap {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }
    .login-card {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 20px;
      padding: 40px 32px;
      max-width: 360px;
      width: 100%;
      text-align: center;
      box-shadow: 0 25px 60px rgba(0,0,0,0.5);
    }
    .input {
      width: 100%;
      padding: 11px 13px;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.06);
      color: #fff;
      font-size: 14px;
      outline: none;
    }
    .input:focus { border-color: rgba(99,102,241,0.5); }
    textarea.input { resize: vertical; min-height: 52px; }
    .btn-primary {
      width: 100%;
      padding: 13px;
      border-radius: 10px;
      border: none;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      color: #fff;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
    }
    .btn-primary:hover { opacity: 0.9; }
    .btn-primary:disabled { opacity: 0.6; cursor: default; }
    .chip {
      padding: 6px 14px;
      border-radius: 20px;
      border: 1px solid rgba(99,102,241,0.4);
      background: rgba(99,102,241,0.1);
      color: #a5b4fc;
      cursor: pointer;
      font-size: 13px;
    }
    .chip:hover { background: rgba(99,102,241,0.3); }
    .tab {
      padding: 8px 16px;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.1);
      background: transparent;
      color: #64748b;
      font-weight: 700;
      cursor: pointer;
      font-size: 13px;
    }
    .tab.active {
      border-color: #6366f1;
      background: rgba(99,102,241,0.2);
      color: #a5b4fc;
    }
    .filtro {
      padding: 5px 13px;
      border-radius: 20px;
      border: 1px solid rgba(255,255,255,0.08);
      background: transparent;
      color: #64748b;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
    }
    .filtro.active {
      border-color: #f59e0b;
      background: rgba(245,158,11,0.15);
      color: #fbbf24;
    }
    .card {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 14px;
      padding: 16px;
      margin-bottom: 11px;
    }
    .card.mia { background: rgba(99,102,241,0.07); border-color: rgba(99,102,241,0.25); }
    .card.cerrada { opacity: 0.72; }
    .badge { border-radius: 6px; padding: 3px 10px; font-size: 11px; font-weight: 700; }
    .label { display: block; font-size: 10px; color: #94a3b8; margin-bottom: 5px; font-weight: 700; letter-spacing: 0.7px; text-transform: uppercase; }
    .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .hint {
      background: rgba(99,102,241,0.1);
      border: 1px solid rgba(99,102,241,0.2);
      border-radius: 8px;
      padding: 8px 12px;
      font-size: 12px;
      color: #a5b4fc;
      margin-bottom: 12px;
    }
    .accion {
      padding: 7px 14px;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
    }
    .toast {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: #1e293b;
      border: 1px solid #6366f1;
      color: #fff;
      padding: 11px 26px;
      border-radius: 12px;
      font-size: 14px;
      z-index: 9998;
      white-space: nowrap;
      box-shadow: 0 8px 30px rgba(0,0,0,0.5);
    }
    .modal-bg {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.8);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
    }
    .modal {
      background: #1e293b;
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 16px;
      padding: 28px 24px;
      max-width: 300px;
      width: 90%;
      text-align: center;
    }
    .pin-input {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.18);
      background: rgba(255,255,255,0.08);
      color: #fff;
      font-size: 22px;
      outline: none;
      text-align: center;
      letter-spacing: 10px;
    }
    .err { color: #f87171; font-size: 13px; margin: 4px 0 8px; }
    .spin {
      width: 36px;
      height: 36px;
      border: 3px solid rgba(99,102,241,0.3);
      border-top: 3px solid #6366f1;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px; color: #94a3b8; }
    .tag { font-size: 10px; border-radius: 4px; padding: 1px 6px; }
  </style>
</head>
<body>
<div id="app"></div>

<script>
const BIN_ID = "69b99b50aa77b81da9f2d396";
const ACCESS_KEY = "$2a$10$bjCOIgcs/BCcMsQZ4GCSCO0pPhjJLXCr0zZY1rq8irl4nDP.DPUOC";
const API = "https://api.jsonbin.io/v3/b/" + BIN_ID;
const ADMIN_PIN = "5467";

// ─── DB ─────────────────────────────────
async function dbLeer() {
  try {
    const r = await fetch(API + "/latest", { headers: { "X-Access-Key": ACCESS_KEY } });
    const d = await r.json();
    return d.record || { usuarios: [], apuestas: [] };
  } catch { return { usuarios: [], apuestas: [] }; }
}

async function dbGuardar(datos) {
  try {
    const r = await fetch(API, {
      method: "PUT",
      headers: { "Content-Type": "application/json", "X-Access-Key": ACCESS_KEY },
      body: JSON.stringify(datos),
    });
    return r.ok;
  } catch { return false; }
}

// ─── Estado ─────────────────────────────
let estado = {
  usuario: "",
  datos: null,
  vista: "lista",
  filtro: "todas",
  guardando: false,
  toast: null,
  toastTimer: null,
  modalAdmin: null,
  form: { partido: "", descripcion: "", euros: "", tipo: "fijo", fechaLimite: "", extra: "" },
  errForm: "",
};

function setState(cambios) { estado = { ...estado, ...cambios }; render(); }

function showToast(m) {
  if (estado.toastTimer) clearTimeout(estado.toastTimer);
  const t = setTimeout(() => setState({ toast: null, toastTimer: null }), 3500);
  setState({ toast: m, toastTimer: t });
}

// ─── Aquí seguiría todo tu código JS exactamente igual, solo con identación limpia ───
</script>
</body>
</html>
